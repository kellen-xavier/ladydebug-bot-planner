name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run tests with coverage
        run: python -m pytest --cov=src/daily --cov-report=term-missing --cov-fail-under=85
